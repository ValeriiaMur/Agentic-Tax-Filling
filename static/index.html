<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tax-Filing Assistant · 2025 Form 1040</title>
<style>
  :root { --bg:#0b0f14; --panel:#121821; --panel2:#0e141c; --line:#1f2a37;
          --txt:#e6edf3; --mut:#8b98a8; --accent:#3b82f6; --good:#22c55e;
          --warn:#f59e0b; --user:#1d4ed8; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.55 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
         background:var(--bg); color:var(--txt); }
  header { padding:14px 20px; border-bottom:1px solid var(--line); display:flex;
           align-items:baseline; gap:12px; }
  header h1 { font-size:16px; margin:0; font-weight:650; }
  header .sub { color:var(--mut); font-size:13px; }
  .wrap { display:grid; grid-template-columns:1fr 380px; gap:0; height:calc(100vh - 53px); }
  .chat { display:flex; flex-direction:column; min-width:0; }
  .msgs { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; }
  .msg { max-width:74%; padding:10px 14px; border-radius:14px; white-space:pre-wrap; }
  .bot { background:var(--panel); border:1px solid var(--line); align-self:flex-start;
         border-bottom-left-radius:4px; }
  .me { background:var(--user); align-self:flex-end; border-bottom-right-radius:4px; }
  .msg strong { font-weight:700; }
  .drop { margin:0 20px 10px; border:1.5px dashed var(--line); border-radius:12px;
          padding:14px; text-align:center; color:var(--mut); cursor:pointer;
          background:var(--panel2); transition:.15s; }
  .drop.hot { border-color:var(--accent); color:var(--txt); background:#10233f; }
  .drop b { color:var(--txt); }
  .drop .sm { font-size:12px; }
  .drop a { color:var(--accent); text-decoration:none; }
  .composer { display:flex; gap:8px; padding:12px 20px 18px; border-top:1px solid var(--line); }
  .composer input { flex:1; background:var(--panel); border:1px solid var(--line);
        color:var(--txt); border-radius:10px; padding:11px 14px; font-size:15px; outline:none; }
  .composer input:focus { border-color:var(--accent); }
  .composer button { background:var(--accent); color:#fff; border:0; border-radius:10px;
        padding:0 18px; font-weight:600; cursor:pointer; }
  .composer button:disabled { opacity:.5; cursor:default; }
  .dl { margin:0 20px 6px; }
  .dl a { display:inline-block; background:var(--good); color:#04210f; font-weight:700;
          padding:9px 16px; border-radius:10px; text-decoration:none; }
  /* observation panel */
  .obs { background:var(--panel2); border-left:1px solid var(--line); display:flex;
         flex-direction:column; min-width:0; }
  .obs h2 { font-size:12px; letter-spacing:.08em; text-transform:uppercase;
            color:var(--mut); margin:0; padding:16px 16px 8px; }
  .trail { flex:1; overflow-y:auto; padding:0 14px 16px; font:12.5px/1.5 ui-monospace,Menlo,monospace; }
  .ev { padding:8px 10px; border:1px solid var(--line); border-radius:8px; margin-bottom:7px;
        background:var(--panel); }
  .ev.flag { border-color:var(--warn); }
  .ev .top { display:flex; justify-content:space-between; color:var(--mut); }
  .ev .ph { color:var(--accent); }
  .ev.flag .ph { color:var(--warn); }
  .ev .ac { color:var(--txt); margin-top:2px; }
  .ev .de { color:var(--mut); margin-top:1px; }
  .empty { color:var(--mut); padding:8px 4px; }
</style>
</head>
<body>
<header>
  <h1>Agentic Tax-Filing Assistant</h1>
  <span class="sub">2025 Form 1040 · educational demo, fake data only</span>
</header>
<div class="wrap">
  <div class="chat">
    <div class="msgs" id="msgs"></div>
    <div class="dl" id="dlBar" style="display:none">
      <a id="dlLink" href="#">↓ Download your completed 1040 (PDF)</a>
    </div>
    <div class="drop" id="drop">
      <div><b>Drop your W-2 here</b> or <a href="#" id="browse">browse</a> — photo or PDF, any W-2.</div>
      <div class="sm">No W-2 handy? <a href="#" id="useSample">Use a sample W-2</a>.</div>
      <input type="file" id="file" accept="image/*,application/pdf" hidden />
    </div>
    <div class="composer">
      <input id="text" placeholder="Type a message, or your W-2 figures…" autocomplete="off" />
      <button id="send">Send</button>
    </div>
  </div>
  <aside class="obs">
    <h2>Observation trail · what the agent did</h2>
    <div class="trail" id="trail"><div class="empty">Decisions and tool calls appear here.</div></div>
  </aside>
</div>
<script>
let SID = null;
const $ = id => document.getElementById(id);
const msgs = $('msgs');

function mdBold(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;')
  .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>'); }

function addMsg(text, who){
  const d = document.createElement('div');
  d.className = 'msg ' + (who==='me'?'me':'bot');
  d.innerHTML = mdBold(text);
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}

function renderTrail(obs){
  const box = $('trail');
  if(!obs || !obs.length){ return; }
  box.innerHTML = '';
  obs.forEach(o=>{
    const d = document.createElement('div');
    d.className = 'ev' + (o.flag?' flag':'');
    d.innerHTML = `<div class="top"><span class="ph">${o.icon||'·'} ${o.phase}</span>`
      + `<span>${o.confText||''}</span></div>`
      + `<div class="ac">${o.action}</div><div class="de">${o.detail}</div>`;
    box.appendChild(d);
  });
  box.scrollTop = box.scrollHeight;
}

function apply(snap){
  if(snap.assistant_message) addMsg(snap.assistant_message,'bot');
  renderTrail(snap.observations);
  if(snap.pdf_ready){
    $('dlBar').style.display = 'block';
    $('dlLink').href = '/api/download/' + SID;
  }
}

async function jpost(url, body){
  const r = await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)});
  return r.json();
}

async function start(){
  const snap = await jpost('/api/session',{});
  SID = snap.session_id;
  apply(snap);
}

async function sendText(){
  const t = $('text').value.trim();
  if(!t || !SID) return;
  $('text').value=''; addMsg(t,'me');
  apply(await jpost('/api/message',{session_id:SID, message:t}));
}

async function uploadFile(f){
  if(!f || !SID) return;
  addMsg('📎 Uploading '+f.name+'…','me');
  const fd = new FormData(); fd.append('session_id',SID); fd.append('file',f);
  const r = await fetch('/api/w2',{method:'POST',body:fd});
  apply(await r.json());
}

async function useSample(){
  if(!SID) return;
  addMsg('📎 Using the sample W-2','me');
  apply(await jpost('/api/sample',{session_id:SID}));
}

// wire up
$('send').onclick = sendText;
$('text').addEventListener('keydown', e=>{ if(e.key==='Enter') sendText(); });
$('browse').onclick = e=>{ e.preventDefault(); $('file').click(); };
$('file').onchange = e=>{ if(e.target.files[0]) uploadFile(e.target.files[0]); };
$('useSample').onclick = e=>{ e.preventDefault(); useSample(); };

const drop = $('drop');
['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{
  e.preventDefault(); drop.classList.add('hot'); }));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{
  e.preventDefault(); drop.classList.remove('hot'); }));
drop.addEventListener('drop', e=>{
  const f = e.dataTransfer.files[0]; if(f) uploadFile(f); });

start();
</script>
</body>
</html>
